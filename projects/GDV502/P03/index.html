<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDV502 P03 - Data-Driven Wave Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="game-container">
    <header class="game-header">
      <h1>Data Defense</h1>
      <p id="waveDesc">Loading waves data...</p>
    </header>

    <div class="hud">
      <div class="stat">Health: <span id="healthVal" class="highlight-health">100</span></div>
      <div class="stat">Wave: <span id="waveVal">0 / 6</span></div>
      <div class="stat">Enemies: <span id="enemiesVal">0</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="600" height="400"></canvas>
      <div id="overlay" class="overlay">
        <h2 id="overlayTitle">Data Defense</h2>
        <p id="overlayMsg">Waves loaded from waves.json.</p>
        <button id="startBtn" class="btn primary mt-4">Start Sequence</button>
      </div>
    </div>
    
    <p class="instruction">Controls: Move mouse to aim. Auto-fire.</p>
  </main>
  
  <script type="module" src="./main.js"></script>
</body>
</html>
